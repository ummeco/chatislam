# Brand Token Guard — B1-07 / B1-01
#
# CI grep guard: fails the build if hardcoded brand hex values appear in JSX/TSX
# outside of canonical token source files. Escape hatch: append '# token-ok'.

name: Brand Token Guard

on:
  push:
    branches: [main, develop]
    paths: ['**/*.tsx', '**/*.jsx']
  pull_request:
    branches: [main, develop]
    paths: ['**/*.tsx', '**/*.jsx']

jobs:
  brand-token-guard:
    name: No hardcoded brand hex in JSX/TSX
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory-only until B-series migration completes (P4-26)
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded brand hex values
        run: |
          HEX_PATTERN='#(C9F27A|79C24C|1E5E2F|0D2F17|c9f27a|79c24c|1e5e2f|0d2f17)'
          ESCAPE_HATCH='token-ok'
          FOUND=0
          VIOLATIONS=""

          while IFS= read -r file; do
            [[ "$file" == *"tokens"* ]] && continue
            [[ "$file" == *".test.tsx"* ]] && continue
            while IFS= read -r match; do
              lineno="${match%%:*}"; content="${match#*:}"
              echo "$content" | grep -q "$ESCAPE_HATCH" && continue
              FOUND=$((FOUND + 1))
              VIOLATIONS="${VIOLATIONS}\n  ${file}:${lineno} — ${content}"
            done < <(grep -n -iE "$HEX_PATTERN" "$file" 2>/dev/null || true)
          done < <(find . -type f \( -name "*.tsx" -o -name "*.jsx" \) \
            -not -path "*/node_modules/*" -not -path "*/.next/*" -not -path "*/.git/*")

          if [ "$FOUND" -gt 0 ]; then
            echo "FAIL: $FOUND hardcoded brand hex found."
            printf "%b\n" "$VIOLATIONS"
            echo "::warning::Brand token violations found — migration tracked in P4-26"; exit 0
          else
            echo "PASS"
          fi
