# Security gate: ban NEXT_PUBLIC_HASURA_ADMIN_SECRET from all source code (CRIT-01 / C16)
name: Security — no NEXT_PUBLIC_ admin secrets

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-next-public-admin-secret:
    name: Grep — NEXT_PUBLIC_HASURA_ADMIN_SECRET must be zero
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if NEXT_PUBLIC_HASURA_ADMIN_SECRET is found in source
        run: |
          set +e
          COUNT=$(grep -rn 'NEXT_PUBLIC_HASURA_ADMIN_SECRET' \
            --include='*.ts' \
            --include='*.tsx' \
            --include='*.js' \
            --include='*.jsx' \
            --include='*.env*' \
            . | grep -v '\.github/workflows/' | wc -l)
          set -e
          echo "Occurrences found: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            grep -rn 'NEXT_PUBLIC_HASURA_ADMIN_SECRET' \
              --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
              --include='*.env*' . | grep -v '\.github/workflows/'
            echo "FATAL: Use HASURA_GRAPHQL_ADMIN_SECRET (server-side only)."
            exit 1
          fi
          echo "OK — zero occurrences."
